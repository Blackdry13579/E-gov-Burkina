name: egov_mobile
description: E-Gov Burkina Faso - Demandes de documents administratifs
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  google_fonts: ^6.2.1
  url_launcher: ^6.2.6
  http: ^1.2.1
  shared_preferences: ^2.2.3
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/building.png
    - assets/images/embleme.png
    - assets/images/monuments.jpg
